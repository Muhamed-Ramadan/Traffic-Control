<svg width="100%" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Traffic Light System — State Machine Flowchart</title>
  <desc>Full state machine showing Normal Mode cycle and Pedestrian Mode scenarios</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #1a1a1a; }
      .th  { font-size: 13px; font-weight: 600; }
      .ts  { font-size: 11px; font-weight: 400; fill: #444; }
      .arr { stroke: #555; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- Normal mode label -->
  <text class="ts" x="340" y="24" text-anchor="middle">Normal mode</text>

  <!-- START -->
  <rect x="270" y="34" width="140" height="36" rx="18" fill="#e8e6e0" stroke="#888" stroke-width="0.5"/>
  <text class="th" x="340" y="56" text-anchor="middle">System start</text>

  <line x1="340" y1="70" x2="340" y2="92" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STATE 0: Yellow before Green -->
  <rect x="220" y="92" width="240" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="th" x="340" y="113" text-anchor="middle">Yellow blink (5 s)</text>
  <text class="ts" x="340" y="133" text-anchor="middle">before Green — state 0</text>

  <line x1="340" y1="144" x2="340" y2="166" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STATE 1: GREEN -->
  <rect x="220" y="166" width="240" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="th" x="340" y="187" text-anchor="middle" fill="#27500A">Green (5 s)</text>
  <text class="ts" x="340" y="207" text-anchor="middle" fill="#3B6D11">vehicles go — state 1</text>

  <line x1="340" y1="218" x2="340" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STATE 2: Yellow after Green -->
  <rect x="220" y="240" width="240" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="th" x="340" y="261" text-anchor="middle">Yellow blink (5 s)</text>
  <text class="ts" x="340" y="281" text-anchor="middle">after Green — state 2</text>

  <line x1="340" y1="292" x2="340" y2="314" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STATE 3: RED -->
  <rect x="220" y="314" width="240" height="52" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text class="th" x="340" y="335" text-anchor="middle" fill="#791F1F">Red (5 s)</text>
  <text class="ts" x="340" y="355" text-anchor="middle" fill="#A32D2D">vehicles stop — state 3</text>

  <!-- loop back -->
  <path d="M460 340 L490 340 L490 118 L460 118" fill="none" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>
  <text class="ts" x="498" y="232" text-anchor="start">loop</text>

  <!-- DIVIDER -->
  <line x1="40" y1="400" x2="640" y2="400" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text class="ts" x="340" y="418" text-anchor="middle">Button pressed (INT0 rising edge)</text>

  <!-- DECISION diamond -->
  <polygon points="340,438 430,470 340,502 250,470" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="466" text-anchor="middle" fill="#3C3489">Current</text>
  <text class="th" x="340" y="482" text-anchor="middle" fill="#3C3489">state?</text>

  <text class="ts" x="178" y="466" text-anchor="middle">state 0/1/2</text>
  <text class="ts" x="510" y="466" text-anchor="middle">state 3 (Red)</text>

  <line x1="250" y1="470" x2="190" y2="470" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="470" x2="490" y2="470" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LEFT BRANCH -->
  <line x1="160" y1="470" x2="160" y2="494" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="60" y="494" width="200" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="th" x="160" y="515" text-anchor="middle">A — Both Yellow blink (5 s)</text>
  <text class="ts" x="160" y="535" text-anchor="middle">Ped Red ON, Car Green ON</text>

  <line x1="160" y1="546" x2="160" y2="568" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="60" y="568" width="200" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="160" y="589" text-anchor="middle" fill="#085041">B — Crossing (5 s)</text>
  <text class="ts" x="160" y="609" text-anchor="middle" fill="#0F6E56">Ped Green ON, Car Red ON</text>

  <line x1="160" y1="620" x2="160" y2="642" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="60" y="642" width="200" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="th" x="160" y="663" text-anchor="middle">C — Both Yellow blink (5 s)</text>
  <text class="ts" x="160" y="683" text-anchor="middle">Ped Green still ON</text>

  <line x1="160" y1="694" x2="160" y2="716" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="60" y="716" width="200" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="th" x="160" y="737" text-anchor="middle" fill="#27500A">D — Resume (5 s)</text>
  <text class="ts" x="160" y="757" text-anchor="middle" fill="#3B6D11">Car Green ON, Ped Red ON</text>

  <!-- RIGHT BRANCH -->
  <line x1="575" y1="470" x2="575" y2="494" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="490" y="494" width="170" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="575" y="515" text-anchor="middle" fill="#085041">B — Crossing (5 s)</text>
  <text class="ts" x="575" y="535" text-anchor="middle" fill="#0F6E56">Ped Green, Car Red</text>

  <line x1="575" y1="546" x2="575" y2="568" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="490" y="568" width="170" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="th" x="575" y="589" text-anchor="middle">C — Yellow blink (5 s)</text>
  <text class="ts" x="575" y="609" text-anchor="middle">Ped Green still ON</text>

  <line x1="575" y1="620" x2="575" y2="642" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="490" y="642" width="170" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="th" x="575" y="663" text-anchor="middle" fill="#27500A">D — Resume (5 s)</text>
  <text class="ts" x="575" y="683" text-anchor="middle" fill="#3B6D11">Car Green, Ped Red</text>

  <!-- MERGE -->
  <path d="M160 768 L160 830 L340 830" fill="none" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>
  <path d="M575 694 L575 830 L342 830" fill="none" stroke="#888" stroke-width="0.5"/>

  <rect x="240" y="842" width="200" height="36" rx="18" fill="#e8e6e0" stroke="#888" stroke-width="0.5"/>
  <text class="th" x="340" y="864" text-anchor="middle">Back to normal mode</text>

  <path d="M240 860 L50 860 L50 118 L220 118" fill="none" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <!-- LEGEND -->
  <rect x="40" y="912" width="12" height="12" rx="2" fill="#EF9F27"/>
  <text class="ts" x="58" y="922">Yellow / warning</text>
  <rect x="170" y="912" width="12" height="12" rx="2" fill="#639922"/>
  <text class="ts" x="188" y="922">Green / go</text>
  <rect x="270" y="912" width="12" height="12" rx="2" fill="#E24B4A"/>
  <text class="ts" x="288" y="922">Red / stop</text>
  <rect x="370" y="912" width="12" height="12" rx="2" fill="#7F77DD"/>
  <text class="ts" x="388" y="922">Decision</text>
  <rect x="460" y="912" width="12" height="12" rx="2" fill="#1D9E75"/>
  <text class="ts" x="478" y="922">Crossing</text>
</svg>
